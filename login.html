<section class="loginShell">
  <div class="loginCard">
    <div class="cardHead">
      <img class="cardLogo" src="/rcrc.png" alt="RCRC" />
      <h2>Sign in</h2>
    </div>

    <div class="field">
      <label>Email</label>
      <input [(ngModel)]="email" type="email" placeholder="name@rcrc.gov.sa" />
    </div>

    <div class="field">
      <label>Password</label>
      <input [(ngModel)]="password" type="password" placeholder="••••••••" />
    </div>

    <button class="btn" (click)="doLogin()" [disabled]="loading">
      {{ loading ? 'Signing in...' : 'Login' }}
    </button>

    <div class="err" *ngIf="error">{{ error }}</div>
  </div>
</section>
